<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackPulse - Contact Us</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>StackPulse</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="product.html">Product</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <main>
            <h2>Contact us</h2>
            <form id="contact-form" action="#" method="post">

                <label for="user-name">Your name</label>
                <input type="text" id="user-name" name="name" class="form-input" placeholder="Jane Smith" required>

                <label for="user-email">Email address</label>
                <input type="email" id="user-email" name="email" class="form-input" placeholder="jane@example.com"
                    required>

                <label for="user-message">Message</label>
                <textarea id="user-message" name="message" class="form-textarea" rows="5"></textarea>

                <button type="submit" class="btn-submit" id="contact-submit">
                    Send message
                </button>

            </form>
        </main>
    </main>

    <footer>
        <p>StackPulse &copy; 2026</p>
    </footer>
</body>

</html>
